server:
  port: ${PORT:8080}

spring:
  application:
    name: dubai-multitrade-poc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/multitrade_poc}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:change-me@example.com}
    password: ${MAIL_PASSWORD:change-me}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    root: INFO

app:
  mail:
    admin-email: ${ADMIN_EMAIL:deploydream@gmail.com}
