server:
  port: ${PORT:8080}

spring:
  application:
    name: dubai-multitrade-poc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/multitrade_poc}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mail:
    admin-email: ${ADMIN_EMAIL:deploydream@gmail.com}
    resend:
      api-key: ${RESEND_API_KEY:}
      endpoint: ${RESEND_API_URL:https://api.resend.com/emails}
      from-email: ${MAIL_FROM:onboarding@resend.dev}
